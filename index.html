<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dimitrios Antoniadis — Junior Software Developer specializing in React & TypeScript. Co-owner of study-saga.com serving 40,000+ users." />
    <meta name="author" content="Dimitrios Antoniadis" />
    <meta name="keywords" content="Dimitrios Antoniadis, Software Developer, React, TypeScript, Frontend Developer, Thessaloniki, Greece" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Prevent theme flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.classList.remove('dark', 'light');
          document.documentElement.classList.add(t);
        } catch (e) {}
      })();
    </script>

    <!-- Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Dimitrios Antoniadis — Software Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
